name: walkability
channels:
  - conda-forge
  - defaults
dependencies:
  # ── Python ────────────────────────────────────────────────────────────────
  - python=3.11

  # ── Geospatial core ───────────────────────────────────────────────────────  
  - gdal>=3.7
  - proj>=9.2
  - geos>=3.12
  - libspatialindex>=1.9
  - geopandas>=0.14
  - pyproj>=3.6
  - shapely>=2.0
  - fiona>=1.9
  - rasterio>=1.3
  - osmnx>=1.9
  - h3-py>=3.7

  # ── Data & compute ────────────────────────────────────────────────────────
  - numpy>=1.26
  - pandas>=2.1
  - scipy>=1.11
  - pyarrow>=14.0          # Parquet I/O
  - fastparquet>=2023.10

  # ── Machine Learning (tabular) ────────────────────────────────────────────
  - scikit-learn>=1.3
  - xgboost>=2.0
  - lightgbm>=4.1
  - optuna>=3.4
  - mlflow>=2.9
  - shap>=0.43

  # ── Visualization ─────────────────────────────────────────────────────────
  - matplotlib>=3.8
  - seaborn>=0.13
  - contextily>=1.4        # Basemap tiles
  - folium>=0.15

  # ── Jupyter ───────────────────────────────────────────────────────────────
  - jupyterlab>=4.0
  - ipykernel>=6.27
  - ipywidgets>=8.1
  - nbformat>=5.9

  # ── Utilities ─────────────────────────────────────────────────────────────
  - requests>=2.31
  - python-dotenv>=1.0
  - tqdm>=4.66
  - pydantic>=2.5
  - loguru>=0.7
  - rich>=13.7              # Pretty terminal output
  - pytest>=7.4
  - pytest-cov>=4.1
  - black>=23.11
  - isort>=5.13
  - pre-commit>=3.6

  # ── pip-only packages (no conda-forge equivalent) ─────────────────────────
  - pip
  - pip:
    - tobler>=0.9           # Areal interpolation Census→H3
    - gtfs-kit>=6.0         # GTFS transit feed parsing
    - census-data-downloader>=0.0.37
    - pysal>=23.7           # Spatial statistics (Moran's I)
    - esda>=2.5             # Spatial autocorrelation
    - libpysal>=4.9
    - streamlit>=1.29
    - pydeck>=0.8           # Deck.gl for Streamlit

